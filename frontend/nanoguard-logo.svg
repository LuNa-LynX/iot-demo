<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Glow effects -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c0c0c0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8e8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a0a0a0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Background glow -->
  <circle cx="100" cy="100" r="85" fill="url(#blueGlow)" opacity="0.3" filter="url(#glow)"/>
  
  <!-- Orbital ring -->
  <ellipse cx="100" cy="100" rx="75" ry="45" fill="none" stroke="#c0c0c0" stroke-width="2" opacity="0.6" transform="rotate(-20 100 100)"/>
  
  <!-- Shield shape -->
  <path d="M 100 30 Q 130 30 150 50 L 150 120 Q 150 140 130 160 Q 100 170 70 160 Q 50 140 50 120 L 50 50 Q 70 30 100 30 Z" 
        fill="url(#shieldGradient)" 
        stroke="#808080" 
        stroke-width="1.5"
        filter="url(#glow)"/>
  
  <!-- Circuit board pattern inside shield -->
  <g opacity="0.4">
    <line x1="70" y1="60" x2="130" y2="60" stroke="#3b82f6" stroke-width="1"/>
    <line x1="70" y1="80" x2="130" y2="80" stroke="#3b82f6" stroke-width="1"/>
    <line x1="70" y1="100" x2="130" y2="100" stroke="#3b82f6" stroke-width="1"/>
    <line x1="70" y1="120" x2="130" y2="120" stroke="#3b82f6" stroke-width="1"/>
    <line x1="100" y1="50" x2="100" y2="140" stroke="#3b82f6" stroke-width="1"/>
    <circle cx="85" cy="70" r="2" fill="#3b82f6"/>
    <circle cx="115" cy="90" r="2" fill="#3b82f6"/>
    <circle cx="85" cy="110" r="2" fill="#3b82f6"/>
    <circle cx="115" cy="130" r="2" fill="#3b82f6"/>
  </g>
  
  <!-- DNA helix pattern -->
  <g opacity="0.5" stroke="#c0c0c0" stroke-width="1.5" fill="none">
    <path d="M 80 60 Q 90 80 80 100 Q 90 120 80 140" />
    <path d="M 120 60 Q 110 80 120 100 Q 110 120 120 140" />
    <line x1="80" y1="70" x2="120" y2="75"/>
    <line x1="80" y1="90" x2="120" y2="95"/>
    <line x1="80" y1="110" x2="120" y2="115"/>
    <line x1="80" y1="130" x2="120" y2="135"/>
  </g>
  
  <!-- EM Letters -->
  <text x="100" y="110" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#c0c0c0" text-anchor="middle" opacity="0.9">EM</text>
  
  <!-- Heartbeat/Lightning bolt between E and M -->
  <path d="M 75 100 L 80 95 L 85 105 L 90 90 L 95 110 L 100 100 L 105 110 L 110 90 L 115 105 L 120 95 L 125 100" 
        stroke="#3b82f6" 
        stroke-width="3" 
        fill="none"
        filter="url(#glow)"/>
  
  <!-- Sparkling particles -->
  <circle cx="60" cy="50" r="2" fill="#3b82f6" opacity="0.8"/>
  <circle cx="140" cy="60" r="1.5" fill="#3b82f6" opacity="0.8"/>
  <circle cx="55" cy="150" r="2" fill="#3b82f6" opacity="0.8"/>
  <circle cx="145" cy="140" r="1.5" fill="#3b82f6" opacity="0.8"/>
  <circle cx="70" cy="30" r="1.5" fill="#3b82f6" opacity="0.8"/>
  <circle cx="130" cy="35" r="2" fill="#3b82f6" opacity="0.8"/>
</svg>

